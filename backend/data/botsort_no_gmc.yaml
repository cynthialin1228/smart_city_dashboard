# BoT-SORT tracker with GMC disabled for fixed-camera traffic footage
tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.10
new_track_thresh: 0.25
track_buffer: 30
match_thresh: 0.80
fuse_score: True

# Disable camera-motion compensation.
# Use lowercase none. Newer Ultralytics versions expect this string value.
gmc_method: none

# BoT-SORT ReID settings. ReID is off by default in Ultralytics.
# Newer Ultralytics tracker configs also require model: auto even when ReID is disabled.
proximity_thresh: 0.50
appearance_thresh: 0.25
with_reid: False
model: auto
